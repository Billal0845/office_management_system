name: Deploy Office Management System

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, bcmath, mysql, zip

      - name: Install Laravel Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: Build React Assets
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy via Rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.TARGET_DIR }}
          # Exclude what should not be overwritten
          EXCLUDE: "/.git/, /.github/, /backend/node_modules/, /frontend/node_modules/, /backend/storage/, /backend/public/storage/, /backend/.env"

      - name: Post-Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.TARGET_DIR }}/backend
            php artisan down || true
            php artisan migrate --force
            php artisan optimize
            php artisan up
